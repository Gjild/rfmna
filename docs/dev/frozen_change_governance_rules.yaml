        {"path_glob": "src/rfmna/rf_metrics/impedance.py"},
        {
          "path_glob": "src/rfmna/cli/design_loader.py",
          "line_tokens_any": [
            "PortBoundary(",
            "p_plus_index=indexing.node_index(port.p_plus),",
            "p_minus_index=indexing.node_index(port.p_minus),"
